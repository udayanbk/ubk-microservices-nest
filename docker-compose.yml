services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "${ZOOKEEPER_PORT}:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_PORT}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1


  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data


  postgres_logs:
    image: postgres:15
    container_name: postgres_logs
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dlq_logs_db
    ports:
      - "${POSTGRES_LOGS_PORT}:5432"
    volumes:
      - postgres_logs_data:/var/lib/postgresql/data


  redis:
    image: redis:7
    container_name: redis
    ports:
      - "${REDIS_PORT}:6379"


  order-service:
    image: node:20
    container_name: order-service
    working_dir: /app
    volumes:
      - .:/app
    command: node dist/apps/order-service/main.js
    ports:
      - "${ORDER_PORT}:9905"
    depends_on:
      - kafka
      - postgres
    # environment:
    #   DATABASE_URL: ${DATABASE_URL}
    #   KAFKA_BROKER: kafka:29092
    env_file:
      - .env.docker


  inventory-service:
    image: node:20
    container_name: inventory-service
    working_dir: /app
    volumes:
      - .:/app
    command: node dist/apps/inventory-service/main.js
    ports:
      - "${INVENTORY_PORT}:9904"
    depends_on:
      - kafka
      - postgres
    # environment:
    #   DATABASE_URL: ${DATABASE_URL}
    #   KAFKA_BROKER: kafka:29092
    env_file:
      - .env.docker


  payment-service:
    image: node:20
    container_name: payment-service
    working_dir: /app
    volumes:
      - .:/app
    command: node dist/apps/payment-service/main.js
    ports:
      - "${PAYMENT_PORT}:9906"
    depends_on:
      - kafka
      - postgres
    # environment:
    #   DATABASE_URL: ${DATABASE_URL}
    #   KAFKA_BROKER: kafka:29092
    env_file:
      - .env.docker


  dlq-service:
    image: node:20
    container_name: dlq-service
    working_dir: /app
    volumes:
      - .:/app
    command: node dist/apps/dlq-service/main.js
    depends_on:
      - kafka
      - postgres_logs
    # environment:
    #   LOGS_DATABASE_URL: ${LOGS_DATABASE_URL}
    #   KAFKA_BROKER: kafka:29092
    env_file:
      - .env.docker


volumes:
  postgres_data:
  postgres_logs_data: